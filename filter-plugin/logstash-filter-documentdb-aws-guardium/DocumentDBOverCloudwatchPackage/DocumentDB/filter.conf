filter {
if [type] == "docdb"
            {
                mutate { add_field => { "log_group" => "%{[cloudwatch_logs][log_group]}" } }
                grok { match => { "log_group" => "^/aws/docdb/%{DATA:cluster}/%{DATA:logtype}$" } }
                mutate {
                    replace => { "serverHostnamePrefix" => "%{account_id}_%{cluster}" }
                    replace => { "dbnamePrefix" => "%{account_id}:%{[cloudwatch_logs][log_stream]}" }
                    replace => { "event_id" => "%{[cloudwatch_logs][event_id]}" }
                }
                documentdb_guardium_filter {}
            }
}